<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SprintBoard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --bg2: #ffffff;
      --bg3: #f8fafc;
      --border: #d1dbe8;
      --text: #1e293b;
      --text2: #64748b;
      --accent: #2563eb;
      --accent-dark: #174F96;
      --danger: #ef4444;
      --radius: 8px;
    }

    body {
      background: linear-gradient(135deg, #174F96 0%, #2563eb 50%, #1e40af 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 44px 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }

    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .logo-img {
      height: 48px;
      width: auto;
      margin-bottom: 12px;
    }

    .logo-fallback {
      width: 52px;
      height: 52px;
      background: var(--accent-dark);
      border-radius: 12px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 32px;
      text-align: center;
      color: var(--text);
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      padding: 10px 14px;
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .error-msg.show { display: block; }

    .success-msg {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: var(--radius);
      padding: 10px 14px;
      color: #16a34a;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg.show { display: block; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="email"], input[type="password"], input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      background: #f8fafc;
      border: 1.5px solid #d1dbe8;
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--accent-dark);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(23,79,150,0.1);
    }

    input[readonly] { background: #f1f5f9; color: var(--text2); }
    input::placeholder { color: #94a3b8; }

    .btn {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent-dark);
      color: #fff;
      margin-top: 8px;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover { background: #1a5cb3; box-shadow: 0 4px 12px rgba(23,79,150,0.3); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .ms-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 14px 16px;
      text-decoration: none;
      color: #111827;
      background: #fff;
      font-weight: 600;
      font-size: 15px;
      width: 100%;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .ms-btn:hover { background: #f9fafb; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .ms-logo {
      display: grid;
      grid-template-columns: repeat(2, 10px);
      grid-template-rows: repeat(2, 10px);
      gap: 2px;
    }

    .ms-logo span { display: block; width: 10px; height: 10px; }

    .hint {
      text-align: center;
      font-size: 12px;
      color: var(--text2);
      margin-top: 16px;
    }

    .hint a { color: var(--accent-dark); text-decoration: none; font-weight: 600; }
    .hint a:hover { text-decoration: underline; }

    /* Panel sections */
    .panel { display: none; }
    .panel.active { display: block; }

    .footer-text {
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Login Panel -->
  <div id="loginPanel" class="panel active">
    <div class="login-card">
      <div class="logo-section">
        <img src="assets/neutara-logo.png" class="logo-img" id="logoImg"
             onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
        <div class="logo-fallback" id="logoFallback">N</div>
      </div>

      <h1>Sign in to your account</h1>

      <div id="loginError" class="error-msg"></div>

      <a href="/auth/microsoft" class="ms-btn">
        <span class="ms-logo">
          <span style="background:#f25022"></span>
          <span style="background:#7fba00"></span>
          <span style="background:#00a4ef"></span>
          <span style="background:#ffb900"></span>
        </span>
        Sign in with Microsoft
      </a>
    </div>
  </div>

  <!-- Accept Invite Panel -->
  <div id="invitePanel" class="panel">
    <div class="login-card">
      <div class="logo-section">
        <img src="assets/neutara-logo.png" class="logo-img" onerror="this.style.display='none'">
      </div>

      <h1>Accept Your Invitation</h1>
      <p style="text-align:center;font-size:13px;color:#64748b;margin-bottom:24px">
        You've been invited to join the workspace. Set your name and password to get started.
      </p>

      <div id="inviteError" class="error-msg"></div>
      <div id="inviteSuccess" class="success-msg"></div>

      <form id="inviteForm">
        <input type="hidden" id="inviteToken">

        <div class="form-group">
          <label for="inviteEmail">Email address</label>
          <input type="email" id="inviteEmail" placeholder="your@email.com" readonly style="opacity:0.7">
        </div>

        <div class="form-group">
          <label for="inviteName">Your full name</label>
          <input type="text" id="inviteName" placeholder="Jane Smith" required>
        </div>

        <div class="form-group">
          <label for="invitePassword">Set password</label>
          <input type="password" id="invitePassword" placeholder="Min 6 characters" required minlength="6">
        </div>

        <div class="form-group">
          <label for="invitePasswordConfirm">Confirm password</label>
          <input type="password" id="invitePasswordConfirm" placeholder="Repeat password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="inviteBtn">Create Account &amp; Sign In</button>

        <div style="margin-top:12px;">
          <a id="inviteMicrosoftBtn" href="/auth/microsoft" class="ms-btn">
            <span class="ms-logo">
              <span style="background:#f25022"></span>
              <span style="background:#7fba00"></span>
              <span style="background:#00a4ef"></span>
              <span style="background:#ffb900"></span>
            </span>
            Sign in with Microsoft
          </a>
        </div>
      </form>

      <div class="hint">
        Already have an account? <a href="#" onclick="showLogin()">Sign in</a>
      </div>
    </div>
  </div>

  <div class="footer-text">© 2026 Neutara Technologies. All rights reserved.</div>

<script>
  // Check if already logged in — but skip redirect if this is an invite link
  (function () {
    var params = new URLSearchParams(window.location.search);
    var hasInvite = params.get('invite');
    if (hasInvite) return;

    var token = localStorage.getItem('sb-token');
    if (token) {
      fetch('/api/auth/me', { headers: { Authorization: 'Bearer ' + token } })
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (user) { if (user) window.location.href = '/'; })
        .catch(function () {});
    }
  })();

  // Check for invite token in URL — fetch invite details and pre-fill email
  (async function () {
    var params = new URLSearchParams(window.location.search);
    var inviteToken = params.get('invite');
    if (!inviteToken) return;

    var loginPanel = document.getElementById('loginPanel');
    var invitePanel = document.getElementById('invitePanel');
    var inviteTokenField = document.getElementById('inviteToken');
    var inviteEmailField = document.getElementById('inviteEmail');
    var inviteNameField = document.getElementById('inviteName');
    var inviteBtn = document.getElementById('inviteBtn');
    var inviteError = document.getElementById('inviteError');
    var inviteMicrosoftBtn = document.getElementById('inviteMicrosoftBtn');

    if (loginPanel) loginPanel.classList.remove('active');
    if (invitePanel) invitePanel.classList.add('active');
    if (inviteTokenField) inviteTokenField.value = inviteToken;

    if (inviteMicrosoftBtn) {
      inviteMicrosoftBtn.href = '/auth/microsoft?mode=invite&invite=' + encodeURIComponent(inviteToken);
    }

    try {
      var res = await fetch('/api/auth/invite/' + encodeURIComponent(inviteToken));
      var data = await res.json();

      if (!res.ok) {
        if (inviteError) { inviteError.textContent = data.error || 'Invalid or expired invitation.'; inviteError.classList.add('show'); }
        if (inviteBtn) inviteBtn.disabled = true;
        if (inviteMicrosoftBtn) { inviteMicrosoftBtn.style.pointerEvents = 'none'; inviteMicrosoftBtn.style.opacity = '0.6'; }
        return;
      }

      if (inviteEmailField) inviteEmailField.value = data.email || '';

      if (inviteNameField && !inviteNameField.value && data.email) {
        var namePart = data.email.split('@')[0].replace(/[._\-]/g, ' ');
        inviteNameField.value = namePart.charAt(0).toUpperCase() + namePart.slice(1);
      }

      if (inviteMicrosoftBtn && data.email) {
        inviteMicrosoftBtn.href = '/auth/microsoft?mode=invite&invite=' + encodeURIComponent(inviteToken) + '&email=' + encodeURIComponent(data.email);
      }
    } catch (e) {
      if (inviteError) { inviteError.textContent = 'Could not load invitation details. Please try again.'; inviteError.classList.add('show'); }
      if (inviteBtn) inviteBtn.disabled = true;
      if (inviteMicrosoftBtn) { inviteMicrosoftBtn.style.pointerEvents = 'none'; inviteMicrosoftBtn.style.opacity = '0.6'; }
    }
  })();

  function showLogin() {
    document.getElementById('invitePanel').classList.remove('active');
    document.getElementById('loginPanel').classList.add('active');
  }

  // Accept invite form
  document.getElementById('inviteForm').addEventListener('submit', async function (e) {
    e.preventDefault();

    var token = document.getElementById('inviteToken').value;
    var name = document.getElementById('inviteName').value.trim();
    var password = document.getElementById('invitePassword').value;
    var confirm = document.getElementById('invitePasswordConfirm').value;
    var btn = document.getElementById('inviteBtn');
    var errEl = document.getElementById('inviteError');
    var sucEl = document.getElementById('inviteSuccess');

    errEl.classList.remove('show');
    sucEl.classList.remove('show');

    if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return; }
    if (password.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.add('show'); return; }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      var res = await fetch('/api/auth/accept-invite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, name: name, password: password })
      });

      var data = await res.json();

      if (!res.ok) {
        errEl.textContent = data.error || 'Failed to accept invitation.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Create Account & Sign In';
        return;
      }

      localStorage.setItem('sb-token', data.token);
      localStorage.setItem('sb-user', JSON.stringify(data.user));
      sucEl.textContent = 'Account created! Redirecting...';
      sucEl.classList.add('show');
      setTimeout(function () { window.location.href = '/'; }, 1200);
    } catch (err) {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account & Sign In';
    }
  });
</script>
</body>
</html>
